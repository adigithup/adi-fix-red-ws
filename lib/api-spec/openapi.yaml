openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: ADI Fix Merah - Sender Management API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: senders
    description: Gmail sender management
  - name: history
    description: Process history
  - name: stats
    description: Statistics and dashboard
  - name: leaderboard
    description: User leaderboard
  - name: settings
    description: App settings
  - name: status
    description: Status page
  - name: users
    description: User management

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /senders:
    get:
      operationId: listSenders
      tags: [senders]
      summary: List all senders
      responses:
        "200":
          description: List of senders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Sender"
    post:
      operationId: createSender
      tags: [senders]
      summary: Add a new sender
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SenderInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sender"

  /senders/{id}:
    get:
      operationId: getSender
      tags: [senders]
      summary: Get sender by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Sender
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sender"
    patch:
      operationId: updateSender
      tags: [senders]
      summary: Update sender
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SenderUpdate"
      responses:
        "200":
          description: Updated sender
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sender"
    delete:
      operationId: deleteSender
      tags: [senders]
      summary: Delete sender
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /senders/{id}/toggle:
    post:
      operationId: toggleSender
      tags: [senders]
      summary: Enable or disable a sender
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SenderToggle"
      responses:
        "200":
          description: Updated sender
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sender"

  /senders/{id}/reset:
    post:
      operationId: resetSender
      tags: [senders]
      summary: Reset sender usage count
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Reset sender
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sender"

  /history:
    get:
      operationId: listHistory
      tags: [history]
      summary: List history entries
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [success, failed, all]
        - name: search
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: History list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HistoryList"
    post:
      operationId: createHistory
      tags: [history]
      summary: Add a history entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HistoryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HistoryEntry"

  /history/{id}:
    delete:
      operationId: deleteHistory
      tags: [history]
      summary: Delete a history entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /stats:
    get:
      operationId: getStats
      tags: [stats]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /stats/activity:
    get:
      operationId: getActivity
      tags: [stats]
      summary: Get recent activity feed
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityEntry"

  /stats/chart:
    get:
      operationId: getChartData
      tags: [stats]
      summary: Get chart data (last 7 days)
      responses:
        "200":
          description: Chart data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChartPoint"

  /leaderboard:
    get:
      operationId: getLeaderboard
      tags: [leaderboard]
      summary: Get user leaderboard
      responses:
        "200":
          description: Leaderboard entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaderboardEntry"

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get app settings
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"
    patch:
      operationId: updateSettings
      tags: [settings]
      summary: Update app settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettingsUpdate"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"

  /status:
    get:
      operationId: getStatus
      tags: [status]
      summary: Get server and website status
      responses:
        "200":
          description: Status info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerStatus"

  /fix-merah/send:
    post:
      operationId: sendFixMerah
      tags: [fix-merah]
      summary: Send fix merah email for a target number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FixMerahSendInput"
      responses:
        "200":
          description: Result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FixMerahResult"

  /fix-merah/stats:
    get:
      operationId: getFixMerahStats
      tags: [fix-merah]
      summary: Get fix merah specific statistics
      responses:
        "200":
          description: Fix merah stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FixMerahStats"

  /fix-merah/history:
    get:
      operationId: listFixMerahHistory
      tags: [fix-merah]
      summary: List fix merah history with pagination
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [success, failed, all]
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: History list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HistoryList"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users
      responses:
        "200":
          description: Users list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      tags: [users]
      summary: Create or upsert a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
      responses:
        "201":
          description: Created user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    Sender:
      type: object
      required: [id, email, status, totalUsed, createdAt]
      properties:
        id:
          type: integer
        email:
          type: string
        appPassword:
          type: string
        status:
          type: string
          enum: [active, disabled, error]
        totalUsed:
          type: integer
        dailyLimit:
          type: ["integer", "null"]
        lastReset:
          type: ["string", "null"]
        lastActive:
          type: ["string", "null"]
        autoRotate:
          type: boolean
        createdAt:
          type: string
        notes:
          type: ["string", "null"]

    SenderInput:
      type: object
      required: [email, appPassword]
      properties:
        email:
          type: string
        appPassword:
          type: string
        dailyLimit:
          type: ["integer", "null"]
        autoRotate:
          type: boolean
        notes:
          type: ["string", "null"]

    SenderUpdate:
      type: object
      properties:
        email:
          type: string
        appPassword:
          type: string
        dailyLimit:
          type: ["integer", "null"]
        autoRotate:
          type: boolean
        notes:
          type: ["string", "null"]

    SenderToggle:
      type: object
      required: [enabled]
      properties:
        enabled:
          type: boolean

    HistoryEntry:
      type: object
      required: [id, userIdentifier, senderEmail, status, createdAt]
      properties:
        id:
          type: integer
        userIdentifier:
          type: string
        senderEmail:
          type: string
        targetNumber:
          type: ["string", "null"]
        status:
          type: string
          enum: [success, failed]
        errorMessage:
          type: ["string", "null"]
        createdAt:
          type: string

    HistoryInput:
      type: object
      required: [userIdentifier, senderEmail, status]
      properties:
        userIdentifier:
          type: string
        senderEmail:
          type: string
        targetNumber:
          type: ["string", "null"]
        status:
          type: string
          enum: [success, failed]
        errorMessage:
          type: ["string", "null"]

    HistoryList:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/HistoryEntry"
        total:
          type: integer

    DashboardStats:
      type: object
      required: [totalSenders, activeSenders, disabledSenders, errorSenders, totalHistory, successCount, failedCount, successRatio, totalUsers, uptime]
      properties:
        totalSenders:
          type: integer
        activeSenders:
          type: integer
        disabledSenders:
          type: integer
        errorSenders:
          type: integer
        totalHistory:
          type: integer
        successCount:
          type: integer
        failedCount:
          type: integer
        successRatio:
          type: number
        totalUsers:
          type: integer
        uptime:
          type: number

    ActivityEntry:
      type: object
      required: [id, type, message, createdAt]
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [success, failed, sender_added, sender_disabled, sender_reset]
        message:
          type: string
        createdAt:
          type: string

    ChartPoint:
      type: object
      required: [date, success, failed]
      properties:
        date:
          type: string
        success:
          type: integer
        failed:
          type: integer

    LeaderboardEntry:
      type: object
      required: [rank, userIdentifier, totalProcessed, successCount, failedCount, successRate]
      properties:
        rank:
          type: integer
        userIdentifier:
          type: string
        totalProcessed:
          type: integer
        successCount:
          type: integer
        failedCount:
          type: integer
        successRate:
          type: number

    Settings:
      type: object
      required: [id, siteName, neonMode, darkMode, loadingMode, bgCustom, animationCustom]
      properties:
        id:
          type: integer
        siteName:
          type: string
        neonMode:
          type: boolean
        darkMode:
          type: boolean
        loadingMode:
          type: boolean
        bgCustom:
          type: ["string", "null"]
        animationCustom:
          type: ["string", "null"]
        updatedAt:
          type: string

    SettingsUpdate:
      type: object
      properties:
        siteName:
          type: string
        neonMode:
          type: boolean
        darkMode:
          type: boolean
        loadingMode:
          type: boolean
        bgCustom:
          type: ["string", "null"]
        animationCustom:
          type: ["string", "null"]

    ServerStatus:
      type: object
      required: [online, serverStatus, totalUsers, totalSenders, activeSenders, uptime, version]
      properties:
        online:
          type: boolean
        serverStatus:
          type: string
        totalUsers:
          type: integer
        totalSenders:
          type: integer
        activeSenders:
          type: integer
        uptime:
          type: number
        version:
          type: string

    FixMerahSendInput:
      type: object
      required: [userIdentifier, targetNumber]
      properties:
        userIdentifier:
          type: string
        targetNumber:
          type: string
        customMessage:
          type: ["string", "null"]

    FixMerahResult:
      type: object
      required: [success, message, senderUsed]
      properties:
        success:
          type: boolean
        message:
          type: string
        senderUsed:
          type: ["string", "null"]
        errorDetail:
          type: ["string", "null"]

    FixMerahStats:
      type: object
      required: [totalSentToday, totalSentAllTime, successToday, failedToday, successAllTime, failedAllTime, availableSenders, queuedToday, successRate]
      properties:
        totalSentToday:
          type: integer
        totalSentAllTime:
          type: integer
        successToday:
          type: integer
        failedToday:
          type: integer
        successAllTime:
          type: integer
        failedAllTime:
          type: integer
        availableSenders:
          type: integer
        queuedToday:
          type: integer
        successRate:
          type: number

    User:
      type: object
      required: [id, identifier, totalProcessed, createdAt]
      properties:
        id:
          type: integer
        identifier:
          type: string
        totalProcessed:
          type: integer
        successCount:
          type: integer
        failedCount:
          type: integer
        lastActive:
          type: ["string", "null"]
        createdAt:
          type: string

    UserInput:
      type: object
      required: [identifier]
      properties:
        identifier:
          type: string
