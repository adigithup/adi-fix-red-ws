kind = "web"
previewPath = "/"
title = "ADI Fix Merah - Sender Dashboard"
version = "1.0.0"
id = "artifacts/sender-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24843

[services.development]
run = "pnpm --filter @workspace/sender-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sender-dashboard", "run", "build" ]
publicDir = "artifacts/sender-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24843"
BASE_PATH = "/"
